version: '3.8'

services:
  db-qa:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mc2
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: mission_control_qa
    ports:
      - "5433:5432"
    volumes:
      - postgres_qa_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc2"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-qa:
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://mc2:${DB_PASSWORD:?DB_PASSWORD required}@db-qa:5432/mission_control_qa
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      db-qa:
        condition: service_healthy

volumes:
  postgres_qa_data: