version: '3.8'

services:
  db-prod:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mc2
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mc2password}
      POSTGRES_DB: mission_control_prod
    ports:
      - "5434:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc2"]
      interval: 5s
      timeout: 5s
      retries: 5

  app-prod:
    build: .
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://mc2:${DB_PASSWORD:-mc2password}@db-prod:5432/mission_control_prod
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      db-prod:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_prod_data: