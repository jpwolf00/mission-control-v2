services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mc2
      POSTGRES_PASSWORD: mc2password
      POSTGRES_DB: mission_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc2"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3004:3000"
    environment:
      DATABASE_URL: postgresql://mc2:mc2password@db:5432/mission_control
      NODE_ENV: production
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_CALLBACK_URL: ${OPENCLAW_CALLBACK_URL:-}
      APP_URL: ${APP_URL}
      ACTIVE_SESSION_TTL_MS: ${ACTIVE_SESSION_TTL_MS:-900000}
    depends_on:
      db:
        condition: service_healthy

  orchestrator:
    build: .
    command: ["node", "scripts/orchestrator-worker.js"]
    environment:
      ORCHESTRATOR_APP_URL: http://app:3000
      ORCHESTRATOR_INTERVAL_MS: ${ORCHESTRATOR_INTERVAL_MS:-10000}
      ORCHESTRATOR_START_DELAY_MS: ${ORCHESTRATOR_START_DELAY_MS:-5000}
      ORCHESTRATOR_DISPATCH_COOLDOWN_MS: ${ORCHESTRATOR_DISPATCH_COOLDOWN_MS:-120000}
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data: