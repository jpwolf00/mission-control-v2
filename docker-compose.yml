services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mc2
      POSTGRES_PASSWORD: mc2password
      POSTGRES_DB: mission_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc2"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3004:3000"
    environment:
      DATABASE_URL: postgresql://mc2:mc2password@db:5432/mission_control
      NODE_ENV: production
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_CALLBACK_URL: ${OPENCLAW_CALLBACK_URL:-}
      APP_URL: ${APP_URL}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: